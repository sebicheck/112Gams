 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LST SIM - Beta 3.1 (Shop Fix)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --s1: #42a5f5; --s2: #66bb6a; --s3: #fdd835; --s4: #ef5350;
            --bg: #0b0e14; --sidebar: #161a23; --accent: #d32f2f; --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; position: fixed; 
        }

        #start-overlay { 
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e2430 0%, #0b0e14 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; padding: 20px;
        }

        .start-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); padding: 35px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center;
        }
        
        .btn { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 1em; color: white; transition: 0.2s; touch-action: manipulation; }
        .btn-blue { background: var(--s1); border-bottom: 4px solid #1976d2; }
        .btn-green { background: var(--s2); border-bottom: 4px solid #388e3c; }
        .btn-yellow { background: var(--s3); color: #000; border-bottom: 4px solid #fbc02d; }
        .btn-red { background: var(--s4); border-bottom: 4px solid #c62828; }
        .btn-gray { background: #444; color: #aaa; border-bottom: 4px solid #222; } /* NEU: Grauer Button für GEKAUFT */
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; border-bottom-width: 0; transform: none; }

        header { background: var(--sidebar); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); z-index: 1000; flex-shrink: 0; }
        .top-status { background: #12141a; padding: 8px 15px; display: flex; justify-content: space-between; font-size: 0.8em; font-weight: bold; flex-shrink: 0; }
        
        #map { height: 22vh; width: 100%; filter: grayscale(1) invert(1) brightness(0.75); z-index: 10; flex-shrink: 0; }
        
        #mission-area { 
            flex-grow: 1; overflow-y: auto; padding: 12px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .m-card { 
            background: var(--sidebar); border-radius: 15px; padding: 15px; margin-bottom: 12px; 
            border: 1px solid #2a2e38; border-left: 6px solid var(--accent);
            touch-action: manipulation; cursor: pointer;
        }
        .m-card.selected { border-color: var(--s1); background: #1e2430; box-shadow: 0 0 10px rgba(66,165,245,0.2); }
        .m-card.processing { opacity: 0.5; pointer-events: none; }
        
        .m-addr { font-size: 0.75em; color: var(--s3); font-weight: bold; display: block; margin-bottom: 3px; }
        .m-title { font-size: 1.05em; font-weight: bold; display: block; }
        .m-reward { background: #12141a; color: var(--s2); font-size: 0.8em; font-weight: bold; padding: 4px 8px; border-radius: 8px; border: 1px solid #333; }
        .req-tag { background: #333; color: var(--s1); padding: 2px 6px; border-radius: 4px; font-size: 0.7em; font-weight: bold; margin-right: 4px; border: 1px solid #444; display: inline-block; margin-bottom: 4px; }

        .bottom-nav { 
            background: var(--sidebar); 
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #333; z-index: 2000; flex-shrink: 0; 
        }
        .garage { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
        .v-btn { background: #232731; border: 1px solid #383e4d; color: white; padding: 10px 0; border-radius: 8px; font-size: 0.6em; font-weight: bold; touch-action: manipulation; cursor: pointer; }
        
        #send-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--accent); color: white; font-weight: 900; font-size: 1.1em; touch-action: manipulation; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 80000; padding: 20px; }
        .shop-item { background: #232731; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #383e4d; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="start-card">
            <h1>LST SIM</h1>
            <p style="color:var(--s1); font-weight: bold; margin-bottom: 25px;">Beta 3.1 - Shop Fix</p>
            <button id="btn-continue" class="btn btn-blue" style="display:none;" onclick="continueGame()">WEITERSPIELEN</button>
            <div id="btn-divider" style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; display:none;"></div>
            <button class="btn btn-green" onclick="startGame('easy')">LEICHT (2.000 €)</button>
            <button class="btn btn-yellow" onclick="startGame('medium')">MITTEL (800 €)</button>
            <button class="btn btn-red" onclick="startGame('hard')">SCHWER (300 €)</button>
        </div>
    </div>

    <header>
        <button style="background:none; border:none; color:white; font-size:30px; cursor:pointer;" onclick="goHome()">🏠</button>
        <b>KÖNIGSBRUNN 112</b>
        <div style="display:flex; gap:10px">
            <button style="background:none; border:none; color:white; font-size:30px; cursor:pointer;" onclick="openShop()">🛒</button>
            <button style="background:none; border:none; color:white; font-size:30px; cursor:pointer;" onclick="document.getElementById('set-mod').style.display='flex'">⚙️</button>
        </div>
    </header>

    <div class="top-status">
        <div>💰 <span id="money-count">0</span> €</div>
        <div id="lvl-box">⭐ LVL <span id="lvl-display">1</span> (<span id="m-progress">0/10</span>)</div>
    </div>

    <div id="map"></div>
    <div id="mission-area"></div>

    <div class="bottom-nav">
        <div class="garage" id="garage"></div>
        <button id="send-btn" onclick="execute()">ALARM AUSLÖSEN</button>
    </div>

    <div id="set-mod" class="modal">
        <div class="card" style="background: var(--sidebar); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px;">
            <h3 style="margin-bottom:15px; text-align:center;">⚙️ Einstellungen</h3>
            <label style="font-size: 0.9em; color: var(--s1); font-weight: bold;">Einsatz-Intervall: <b id="freq-val">30</b> Sekunden</label>
            <input type="range" id="freq-slider" min="10" max="90" step="5" value="30" oninput="updateFreq(this.value)" style="width:100%; margin: 10px 0 25px 0;">
            <button id="sound-btn" class="btn btn-green" onclick="toggleSound()">SOUND: AN</button>
            <button class="btn btn-blue" onclick="goHome(); document.getElementById('set-mod').style.display='none'">🏠 ZUM HAUPTMENÜ</button>
            <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
            <button class="btn btn-red" onclick="resetGame()">SPIELSTAND LÖSCHEN</button>
            <button class="btn btn-yellow" style="color:black;" onclick="document.getElementById('set-mod').style.display='none'">SCHLIESSEN</button>
        </div>
    </div>

    <div id="shop-mod" class="modal">
        <div class="card" style="background: var(--sidebar); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px;">
            <h3 style="margin-bottom:15px;">🛒 Fahrzeugmarkt</h3>
            <div id="shop-list" style="max-height:50vh; overflow-y:auto; padding-right:5px;"></div><br>
            <button class="btn btn-yellow" style="color:black;" onclick="document.getElementById('shop-mod').style.display='none'">SCHLIESSEN</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, money = 0, lvl = 1, doneMissions = 0, vehicles = {}, activeMissions = [], selectedVehicles = [], selectedMissionId = null;
        let gameRunning = false, spawnTimer = null, missionFreq = 30, countdown = 5, soundEnabled = true, diffMult = 1.0, lvlStep = 10;
        let audioCtx = null;

        // NEUER KEY für Beta 3.1
        const SAVE_KEY = 'lst_sim_v3.1';

        const streetNames = ["Hauptstraße", "Bürgermeister-Wohlfarth-Str.", "Haunstetter Str.", "Gartenstraße", "Landsberger Str.", "Finkenweg", "Heidestraße", "Guldenstraße", "Messerschmittstr.", "Königsallee"];
        
        const missionPool = [
            { t: "Katze auf Baum", req: ["DLK"], reward: 150, duration: 15000 },
            { t: "Mülltonnenbrand", req: ["LF"], reward: 250, duration: 25000 },
            { t: "Fahrzeugbrand", req: ["LF"], reward: 500, duration: 35000 },
            { t: "Ölspur klein", req: ["GW"], reward: 200, duration: 20000 },
            { t: "Keller unter Wasser", req: ["LF"], reward: 400, duration: 40000 },
            { t: "Zimmerbrand", req: ["ELW", "LF", "DLK"], reward: 1500, duration: 60000 },
            { t: "VU - Person klemmt", req: ["ELW", "LF", "GW"], reward: 2000, duration: 90000 },
            { t: "Dachstuhlbrand", req: ["ELW", "LF", "LF", "DLK"], reward: 3000, duration: 120000 }
        ];

        // SHOP ITEMS MIT "max" (Maximale Anzahl dieses Fahrzeugtyps in der Flotte)
        const shopItems = [
            { n: "Zweites LF", t: "LF", p: 4500, l: 2, max: 2 },
            { n: "Drehleiter (1)", t: "DLK", p: 8000, l: 3, max: 1 },
            { n: "Rüstwagen (GW)", t: "GW", p: 3000, l: 4, max: 1 },
            { n: "Zweiter ELW", t: "ELW", p: 4000, l: 5, max: 2 },
            { n: "Drehleiter (2)", t: "DLK", p: 11000, l: 6, max: 2 }
        ];

        window.onload = () => { 
            if(localStorage.getItem(SAVE_KEY)) {
                document.getElementById('btn-continue').style.display = 'block';
                document.getElementById('btn-divider').style.display = 'block';
            }
        };

        function saveGame() { 
            localStorage.setItem(SAVE_KEY, JSON.stringify({money, lvl, vehicles, doneMissions, diff: diffMult, step: lvlStep, freq: missionFreq})); 
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function startGame(mode) {
            initAudio();
            money = (mode === 'easy') ? 2000 : (mode === 'hard') ? 300 : 800;
            diffMult = (mode === 'easy') ? 1.3 : (mode === 'hard') ? 0.8 : 1.0;
            
            // Standard Flotte: 1x ELW, 1x LF
            vehicles = {"10/1":{type:"ELW",status:2}, "40/1":{type:"LF",status:2}};
            
            lvl = 1; doneMissions = 0; activeMissions = [];
            continueGame();
        }

        function continueGame() {
            initAudio();
            const data = localStorage.getItem(SAVE_KEY);
            if(data) {
                const d = JSON.parse(data);
                money = d.money; lvl = d.lvl; vehicles = d.vehicles; doneMissions = d.doneMissions;
                diffMult = d.diff; missionFreq = d.freq || 30;
                document.getElementById('freq-slider').value = missionFreq;
                document.getElementById('freq-val').innerText = missionFreq;
            }
            document.getElementById('start-overlay').style.display = 'none';
            gameRunning = true;
            if(!map) {
                map = L.map('map', {zoomControl:false, attributionControl:false, tap: false}).setView([48.268, 10.891], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            startSpawner(); updateUI(); renderGarage();
        }

        function goHome() {
            saveGame();
            gameRunning = false;
            if(spawnTimer) clearInterval(spawnTimer);
            document.getElementById('set-mod').style.display = 'none';
            document.getElementById('start-overlay').style.display = 'flex';
            document.getElementById('btn-continue').style.display = 'block';
            document.getElementById('btn-divider').style.display = 'block';
        }

        function updateFreq(val) {
            missionFreq = parseInt(val);
            document.getElementById('freq-val').innerText = val;
            if(countdown > missionFreq) countdown = missionFreq;
            saveGame();
        }

        function toggleSound() { 
            soundEnabled = !soundEnabled; 
            const btn = document.getElementById('sound-btn');
            btn.innerText = "SOUND: " + (soundEnabled ? "AN" : "AUS"); 
            btn.className = "btn " + (soundEnabled ? "btn-green" : "btn-red"); 
        }

        function playAlarm() {
            if (!soundEnabled || !audioCtx) return;
            const playTone = (freq, start, duration) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + start);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + start + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + duration);
            };
            playTone(880, 0, 0.4); playTone(659, 0.2, 0.4); playTone(523, 0.4, 0.6);
        }

        function startSpawner() {
            if(spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                if(!gameRunning) return;
                let maxMissions = (lvl >= 6) ? 4 : (lvl >= 4) ? 3 : 2;
                if(activeMissions.length < maxMissions) {
                    countdown--;
                    if(countdown <= 0) {
                        spawnMission();
                        countdown = missionFreq;
                    }
                }
            }, 1000);
        }

        function spawnMission() {
            const ownedTypes = Object.values(vehicles).map(v => v.type);
            const possible = missionPool.filter(m => {
                let temp = [...ownedTypes];
                return m.req.every(req => {
                    let idx = temp.indexOf(req);
                    if(idx > -1) { temp.splice(idx, 1); return true; }
                    return false;
                });
            });

            if(!possible.length) return;
            const m = possible[Math.floor(Math.random()*possible.length)];
            const lat = 48.268 + (Math.random()-0.5)*0.015, lng = 10.891 + (Math.random()-0.5)*0.02;
            const marker = L.circleMarker([lat, lng], {color:'red', radius:10}).addTo(map);
            const street = streetNames[Math.floor(Math.random()*streetNames.length)] + " " + (Math.floor(Math.random()*60)+1);
            
            activeMissions.push({...m, id: Math.random(), lat, lng, marker, processing: false, addr: street});
            playAlarm();
            updateUI();
        }

        function updateUI() {
            document.getElementById('money-count').innerText = Math.floor(money).toLocaleString();
            document.getElementById('lvl-display').innerText = lvl;
            document.getElementById('m-progress').innerText = `${doneMissions}/${lvl * lvlStep}`;
            const area = document.getElementById('mission-area'); area.innerHTML = "";
            activeMissions.forEach(m => {
                const card = document.createElement('div');
                card.className = `m-card ${selectedMissionId === m.id ? 'selected' : ''} ${m.processing ? 'processing' : ''}`;
                const reward = Math.floor(m.reward * diffMult);
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div><span class="m-addr">📍 ${m.addr}</span><span class="m-title">${m.t}</span></div>
                        <span class="m-reward">+ ${reward} €</span>
                    </div>
                    <div style="margin-top:8px;">${m.req.map(r => `<span class="req-tag">${r}</span>`).join("")}</div>
                `;
                card.onclick = () => { selectedMissionId = m.id; updateUI(); map.panTo([m.lat, m.lng]); };
                area.appendChild(card);
            });
            renderGarageColors();
        }

        function renderGarage() {
            const g = document.getElementById('garage'); g.innerHTML = "";
            Object.keys(vehicles).sort().forEach(v => {
                const btn = document.createElement('button');
                btn.className = "v-btn"; btn.id = "btn-"+v;
                btn.innerHTML = `${v}<br>${vehicles[v].type}`;
                btn.onclick = () => {
                    if(vehicles[v].status === 2) {
                        let i = selectedVehicles.indexOf(v);
                        if(i > -1) selectedVehicles.splice(i, 1); else selectedVehicles.push(v);
                        updateUI();
                    }
                };
                g.appendChild(btn);
            });
        }

        function renderGarageColors() {
            Object.keys(vehicles).forEach(v => {
                const b = document.getElementById('btn-'+v); if(!b) return;
                let s = vehicles[v].status;
                b.style.background = s===3?'var(--s3)':s===4?'var(--s4)':s===1?'var(--s1)':'#232731';
                b.style.border = selectedVehicles.includes(v) ? "2px solid white" : "1px solid #383e4d";
                b.style.color = s===3 ? 'black' : 'white';
            });
        }

        function execute() {
            if(!selectedMissionId || !selectedVehicles.length) return;
            const m = activeMissions.find(x => x.id === selectedMissionId);
            if(!m || m.processing) return;
            
            const sentTypes = selectedVehicles.map(v => vehicles[v].type);
            const missing = m.req.filter(r => {
                const idx = sentTypes.indexOf(r);
                if(idx > -1) { sentTypes.splice(idx, 1); return false; }
                return true;
            });

            if(missing.length > 0) { alert("Es fehlen Fahrzeuge: " + missing.join(", ")); return; }

            m.processing = true;
            const sent = [...selectedVehicles]; selectedVehicles = []; selectedMissionId = null;
            sent.forEach(v => vehicles[v].status = 3); updateUI();
            
            setTimeout(() => {
                sent.forEach(v => vehicles[v].status = 4); updateUI();
                setTimeout(() => {
                    if(m.marker) map.removeLayer(m.marker);
                    activeMissions = activeMissions.filter(x => x.id !== m.id);
                    money += (m.reward * diffMult); doneMissions++;
                    if(doneMissions >= (lvl * lvlStep)) { doneMissions = 0; lvl++; alert("LEVEL UP!"); }
                    sent.forEach(v => vehicles[v].status = 1); updateUI();
                    setTimeout(() => { sent.forEach(v => vehicles[v].status = 2); updateUI(); saveGame(); }, 5000);
                }, m.duration);
            }, 3000);
        }

        function openShop() {
            const list = document.getElem
