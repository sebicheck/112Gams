<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ILS Königsbrunn Pro</title>
    <style>
        :root { 
            --s1: #42a5f5; --s2: #66bb6a; --s3: #fdd835; --s4: #ef5350;
            --bg: #0f111a; --sidebar: #1a1c23; --accent: #d32f2f; --text: #f0f0f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: sans-serif; }

        /* START SCREEN */
        #start-overlay { position: fixed; inset: 0; background: #0f111a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .start-card { background: var(--sidebar); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; width: 90%; max-width: 350px; }
        .start-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* HEADER & STATS */
        header { background: var(--sidebar); padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .top-info { background: #12141a; padding: 6px 12px; display: flex; justify-content: space-between; font-size: 0.75em; border-bottom: 1px solid #333; }
        .money { color: #ffca28; font-weight: bold; }

        /* MAP */
        #map { height: 18vh; background: #1b211b; position: relative; border-bottom: 1px solid #333; flex-shrink: 0; }
        .marker { position: absolute; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; border: 2px solid white; transform: translate(-50%, -50%); display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; z-index: 10; }

        /* LOGBUCH (Neu!) */
        #radio-log { height: 60px; background: #000; color: #4caf50; font-family: monospace; font-size: 0.7em; padding: 5px 10px; overflow-y: hidden; border-bottom: 1px solid #333; }
        #radio-log div { border-left: 2px solid #4caf50; padding-left: 5px; margin-bottom: 2px; }

        /* MISSION AREA */
        #mission-area { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #14161e; }
        .m-card { background: var(--sidebar); border-radius: 10px; padding: 10px; border: 1px solid #333; font-size: 0.85em; }
        .m-card.selected { border-color: var(--s1); background: #252833; }

        /* GARAGE */
        .bottom-ui { flex-shrink: 0; background: var(--sidebar); border-top: 1px solid #333; padding: 10px; padding-bottom: 25px; }
        .garage { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .v-btn { background: #2c2f3a; border: none; color: white; padding: 14px 0; border-radius: 8px; font-size: 0.8em; font-weight: bold; position: relative; }
        .v-btn.selected { background: var(--s1); }
        .v-btn span { position: absolute; top: -4px; right: -4px; background: #444; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }

        #send-btn { width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="start-card">
            <h1 style="color:var(--accent)">ILS KÖNIGSBRUNN</h1>
            <p style="margin-top:10px; font-size:0.8em">Simulation wird geladen...</p>
            <button class="start-btn" onclick="startGame()">DIENST ANTRETEN</button>
        </div>
    </div>

    <header>
        <span style="font-weight:900;">ILS KÖNIGSBRUNN</span>
        <div id="clock">00:00:00</div>
    </header>

    <div class="top-info">
        <span>👩‍🚒 Personal: <b id="staff-count">45</b></span>
        <span class="money">💰 <span id="money-count">0</span> €</span>
        <span>LVL <b id="lvl">1</b></span>
    </div>

    <div id="map">
        <div id="dot0" class="marker">1</div>
        <div id="dot1" class="marker">2</div>
        <div id="dot2" class="marker">3</div>
    </div>

    <div id="radio-log">
        <div>> System bereit. Warten auf Notruf...</div>
    </div>

    <div id="mission-area"></div>

    <div class="bottom-ui">
        <div class="garage" id="garage"></div>
        <button id="send-btn" onclick="execute()">Einsatz senden</button>
    </div>

    <script>
        let audioCtx;
        const vehicles = {
            "10/1": { staff: 2, status: 2 }, "12/1": { staff: 3, status: 2 },
            "40/1": { staff: 9, status: 2 }, "40/2": { staff: 9, status: 2 },
            "30/1": { staff: 3, status: 2 }, "41/1": { staff: 9, status: 2 },
            "62/1": { staff: 2, status: 2 }, "65/1": { staff: 3, status: 2 },
            "21/1": { staff: 6, status: 2 }
        };

        let activeMissions = [], selectedVehicles = [], selectedMissionId = null;
        let xp = 0, lvl = 1, staffMax = 45, staffCurrent = 45, money = 0;

        function logFunk(msg) {
            const log = document.getElementById('radio-log');
            const time = new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            log.innerHTML = `<div>[${time}] ${msg}</div>` + log.innerHTML;
        }

        function playTone(freq, duration, vol) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playAlarm() {
            const tones = [1200, 900, 1200, 900, 1500];
            tones.forEach((t, i) => setTimeout(() => playTone(t, 0.4, 0.1), i * 500));
        }

        function startGame() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-overlay').style.display = 'none';
            setInterval(triggerMission, 18000);
            triggerMission();
        }

        Object.keys(vehicles).forEach(v => {
            document.getElementById('garage').innerHTML += `
                <button class="v-btn" id="btn-${v}" onclick="toggleV('${v}')">
                    ${v} <span>${vehicles[v].staff}</span>
                </button>`;
        });

        function toggleV(v) {
            if(vehicles[v].status !== 2) return;
            const idx = selectedVehicles.indexOf(v);
            if(idx > -1) {
                selectedVehicles.splice(idx, 1);
                document.getElementById('btn-'+v).classList.remove('selected');
            } else {
                selectedVehicles.push(v);
                document.getElementById('btn-'+v).classList.add('selected');
            }
        }

        const missionPool = [
            { t: "Keller unter Wasser", staff: 3, xp: 40, reward: 50 },
            { t: "Baum auf Straße", staff: 6, xp: 60, reward: 80 },
            { t: "Zimmerbrand", staff: 15, xp: 250, reward: 300 },
            { t: "VU Person klemmt", staff: 13, xp: 200, reward: 250 }
        ];

        function triggerMission() {
            if(activeMissions.length >= 3) return;
            const m = {...missionPool[Math.floor(Math.random()*missionPool.length)], id: Math.random(), x: 15+Math.random()*70, y: 15+Math.random()*70};
            activeMissions.push(m);
            playAlarm();
            logFunk("ALARM: " + m.t);
            updateUI();
        }

        function updateUI() {
            const area = document.getElementById('mission-area');
            area.innerHTML = activeMissions.length === 0 ? '<div style="text-align:center; padding:20px; color:#555;">Funkstille...</div>' : '';
            activeMissions.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = `m-card ${selectedMissionId === m.id ? 'selected' : ''}`;
                div.onclick = () => { selectedMissionId = m.id; updateUI(); };
                div.innerHTML = `<b>${m.t}</b><br><small>Min. Personal: ${m.staff} | Belohnung: ${m.reward} €</small>`;
                area.appendChild(div);
                const dot = document.getElementById('dot'+i);
                dot.style.display = "flex"; dot.style.left = m.x+"%"; dot.style.top = m.y+"%";
            });
            [0,1,2].forEach(i => { if(i >= activeMissions.length) document.getElementById('dot'+i).style.display="none"; });
            document.getElementById('staff-count').innerText = staffCurrent;
            document.getElementById('money-count').innerText = money;
            Object.keys(vehicles).forEach(v => {
                const btn = document.getElementById('btn-'+v);
                btn.disabled = (vehicles[v].status !== 2);
                btn.style.opacity = (vehicles[v].status === 2) ? "1" : "0.2";
            });
        }

        function execute() {
            if(!selectedMissionId || selectedVehicles.length === 0) return;
            const mIdx = activeMissions.findIndex(m => m.id === selectedMissionId);
            const m = activeMissions[mIdx];
            let totalStaff = 0;
            selectedVehicles.forEach(v => totalStaff += vehicles[v].staff);

            if(totalStaff < m.staff || staffCurrent < totalStaff) {
                alert("Personalmangel!"); return;
            }

            const ve = [...selectedVehicles];
            const usedStaff = totalStaff;
            staffCurrent -= usedStaff;
            selectedVehicles = []; selectedMissionId = null;
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('selected'));
            
            logFunk("S3: Fahrzeuge rücken aus.");
            ve.forEach(v => vehicles[v].status = 3);
            updateUI();

            setTimeout(() => {
                logFunk("S4: Ankunft am Einsatzort.");
                ve.forEach(v => vehicles[v].status = 4);
                updateUI();
                setTimeout(() => {
                    logFunk("Einsatz beendet. Rückfahrt.");
                    activeMissions.splice(mIdx, 1);
                    money += m.reward;
                    xp += m.xp; if(xp >= lvl*500) { lvl++; xp=0; logFunk("Beförderung auf LVL " + lvl); }
                    document.getElementById('lvl').innerText = lvl;
                    ve.forEach(v => vehicles[v].status = 1);
                    updateUI();
                    setTimeout(() => {
                        ve.forEach(v => vehicles[v].status = 2);
                        staffCurrent += usedStaff;
                        logFunk("Fahrzeuge wieder einsatzbereit.");
                        updateUI();
                    }, 8000);
                }, 10000);
            }, 3000);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
    </script>
</body>
</html>
